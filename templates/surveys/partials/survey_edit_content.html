{% load djicons i18n %}
<div data-back-url="{% url 'surveys:surveys_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Survey" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'surveys:surveys_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-survey-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-survey-form"
          hx-post="{% url 'surveys:survey_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Title" %}</label>
                <input type="text" name="title" class="input input-sm w-full" value="{{ obj.title }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3">{{ obj.description }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active" {% if obj.is_active %}checked{% endif %}>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Start Date" %}</label>
                <input type="date" name="start_date" class="input input-sm w-full" value="{{ obj.start_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "End Date" %}</label>
                <input type="date" name="end_date" class="input input-sm w-full" value="{{ obj.end_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Response Count" %}</label>
                <input type="number" name="response_count" class="input input-sm w-full" value="{{ obj.response_count }}">
                </div>
            </div>
        </div>
    </form>
</div>
